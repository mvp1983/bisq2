on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

      name:
        required: true
        type: string

      build-root-dir:
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.name }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0
        with:
          submodules: 'true'

      - name: Setup Java JDK
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Gradle Build Action
        uses: gradle/gradle-build-action@v3.5.0
        with:
          arguments: build -x test
          build-root-directory: ${{ inputs.build-root-dir }}
          gradle-executable: ./gradlew
          gradle-version: 8.9

      # Add this new step to package builds from Linux runners
      - name: Upload Linux Packages
        if: runner.os == 'Linux' && inputs.name == 'Bisq'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ github.run_id }}
          path: |
            ${{ inputs.build-root-dir }}/build/packaging/jpackage/packages/*.deb
            ${{ inputs.build-root-dir }}/build/packaging/jpackage/packages/*.rpm
            ${{ inputs.build-root-dir }}/build/packaging/jpackage/packages/aur/**
          retention-days: 7

      # Similarly for macOS and Windows packages if needed
      - name: Upload macOS Packages
        if: runner.os == 'macOS' && inputs.name == 'Bisq'
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages-${{ github.run_id }}
          path: ${{ inputs.build-root-dir }}/build/packaging/jpackage/packages/*.dmg
          retention-days: 7

      - name: Upload Windows Packages
        if: runner.os == 'Windows' && inputs.name == 'Bisq'
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages-${{ github.run_id }}
          path: |
            ${{ inputs.build-root-dir }}/build/packaging/jpackage/packages/*.exe
            ${{ inputs.build-root-dir }}/build/packaging/jpackage/packages/*.msi
          retention-days: 7